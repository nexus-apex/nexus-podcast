{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Episode | NexusPodcast{% endblock %}
{% block page_title %}{% if editing %}Edit Episode{% else %}New Episode{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Show Title</label>
        <input type="text" name="show_title" value="{{ record.show_title|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Episode Number</label>
        <input type="number" name="episode_number" value="{{ record.episode_number|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Duration Mins</label>
        <input type="number" name="duration_mins" value="{{ record.duration_mins|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Published Date</label>
        <input type="date" name="published_date" value="{{ record.published_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Downloads</label>
        <input type="number" name="downloads" value="{{ record.downloads|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="scheduled" {% if record.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
          <option value="published" {% if record.status == 'published' %}selected{% endif %}>Published</option>
          <option value="archived" {% if record.status == 'archived' %}selected{% endif %}>Archived</option>
        </select>
      </div>
      <div class="form-group">
        <label>Audio Url</label>
        <input type="url" name="audio_url" value="{{ record.audio_url|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Episode</button>
      <a href="/episodes/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
