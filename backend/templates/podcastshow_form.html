{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} PodcastShow | NexusPodcast{% endblock %}
{% block page_title %}{% if editing %}Edit PodcastShow{% else %}New PodcastShow{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Host</label>
        <input type="text" name="host" value="{{ record.host|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select name="category">
          <option value="technology" {% if record.category == 'technology' %}selected{% endif %}>Technology</option>
          <option value="business" {% if record.category == 'business' %}selected{% endif %}>Business</option>
          <option value="education" {% if record.category == 'education' %}selected{% endif %}>Education</option>
          <option value="entertainment" {% if record.category == 'entertainment' %}selected{% endif %}>Entertainment</option>
          <option value="news" {% if record.category == 'news' %}selected{% endif %}>News</option>
          <option value="health" {% if record.category == 'health' %}selected{% endif %}>Health</option>
        </select>
      </div>
      <div class="form-group">
        <label>Episodes</label>
        <input type="number" name="episodes" value="{{ record.episodes|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Subscribers</label>
        <input type="number" name="subscribers" value="{{ record.subscribers|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Rating</label>
        <input type="number" step="0.01" name="rating" value="{{ record.rating|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="paused" {% if record.status == 'paused' %}selected{% endif %}>Paused</option>
          <option value="ended" {% if record.status == 'ended' %}selected{% endif %}>Ended</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} PodcastShow</button>
      <a href="/podcastshows/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
